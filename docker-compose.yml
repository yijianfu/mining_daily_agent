version: "3.9"

services:
  mining-news-mcp:
    build:
      context: .
      dockerfile: servers/mining_news_mcp/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  mineral-pdf-mcp:
    build:
      context: .
      dockerfile: servers/mineral_pdf_mcp/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - PDF_MAX_SIZE_MB=50
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  lme-price-mcp:
    build:
      context: .
      dockerfile: servers/lme_price_mcp/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - LME_PRICE_PROVIDER=${LME_PRICE_PROVIDER:-mock}
      - ITICK_API_KEY=${ITICK_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web UI (recommended) ────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: agent/Dockerfile
    command: ["python", "-m", "agent.web_server", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    depends_on:
      mining-news-mcp:
        condition: service_healthy
      mineral-pdf-mcp:
        condition: service_healthy
      lme-price-mcp:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - MCP_CLIENT_TRANSPORT=sse
      - MCP_NEWS_URL=http://mining-news-mcp:8000/sse
      - MCP_PDF_URL=http://mineral-pdf-mcp:8000/sse
      - MCP_LME_URL=http://lme-price-mcp:8000/sse
      - MODEL_PROVIDER=${MODEL_PROVIDER:-}
      - MODEL_NAME=${MODEL_NAME:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONPATH=/app
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── CLI agent (optional) ────────────────────────────────────────────────
  agent:
    profiles: ["cli"]
    build:
      context: .
      dockerfile: agent/Dockerfile
    depends_on:
      mining-news-mcp:
        condition: service_healthy
      mineral-pdf-mcp:
        condition: service_healthy
      lme-price-mcp:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - MCP_CLIENT_TRANSPORT=sse
      - MCP_NEWS_URL=http://mining-news-mcp:8000/sse
      - MCP_PDF_URL=http://mineral-pdf-mcp:8000/sse
      - MCP_LME_URL=http://lme-price-mcp:8000/sse
      - MODEL_PROVIDER=${MODEL_PROVIDER:-}
      - MODEL_NAME=${MODEL_NAME:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONPATH=/app
    stdin_open: true
    tty: true
    command: ["python", "-m", "agent.main", "给我生成一份关于 Pilbara 锂矿的今日简报"]
